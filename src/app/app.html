<div class="min-h-screen bg-slate-100 p-8">
  <div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-slate-800 mb-8 text-center">Todo App v20</h1>

    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex gap-2">
      <input
        #taskInput
        (keyup.enter)="addTask(taskInput.value); taskInput.value = ''"
        type="text"
        placeholder="Co jest do zrobienia?"
        class="flex-1 px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
      />
      <button
        (click)="addTask(taskInput.value); taskInput.value = ''"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold transition"
      >
        Dodaj
      </button>
    </div>

    <div class="space-y-3">
      @for (task of tasks(); track task.id) {
        <div
          class="flex items-center justify-between p-4 bg-white rounded-xl shadow-sm border border-transparent hover:border-indigo-200 transition"
        >
          <span class="text-slate-700">{{ task.title }}</span>
          <button
            (click)="deleteTask(task.id)"
            class="text-slate-300 hover:text-rose-500 transition"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          </button>
        </div>
      }
    </div>
  </div>
</div>
